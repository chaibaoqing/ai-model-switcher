<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Codex Model Switcher</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0a0a0a; color: #e0e0e0; min-height: 100vh; }
    .container { max-width: 800px; margin: 0 auto; padding: 40px 20px; }
    h1 { font-size: 24px; margin-bottom: 8px; }
    h1 span { color: #10a37f; }
    .subtitle { color: #888; margin-bottom: 32px; font-size: 14px; }
    .card { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 12px; padding: 24px; margin-bottom: 20px; }
    .card-title { font-size: 16px; font-weight: 600; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
    .card-title .dot { width: 8px; height: 8px; border-radius: 50%; }
    .dot-green { background: #10a37f; }
    .dot-yellow { background: #f59e0b; }
    .dot-gray { background: #555; }
    .provider-grid { display: grid; gap: 16px; }
    .provider-item { background: #111; border: 1px solid #2a2a2a; border-radius: 8px; padding: 20px; transition: border-color 0.2s; }
    .provider-item.active { border-color: #10a37f; }
    .provider-item:hover { border-color: #444; }
    .provider-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    .provider-name { font-weight: 600; font-size: 16px; }
    .provider-model { color: #888; font-size: 13px; }
    .badge { font-size: 11px; padding: 2px 8px; border-radius: 10px; font-weight: 600; }
    .badge-active { background: #10a37f22; color: #10a37f; border: 1px solid #10a37f44; }
    .badge-inactive { background: #333; color: #888; }
    .form-group { margin-bottom: 12px; }
    .form-group label { display: block; font-size: 12px; color: #888; margin-bottom: 4px; }
    .form-group input { width: 100%; padding: 8px 12px; background: #0a0a0a; border: 1px solid #2a2a2a; border-radius: 6px; color: #e0e0e0; font-size: 14px; outline: none; }
    .form-group input:focus { border-color: #10a37f; }
    .btn { padding: 8px 16px; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; font-weight: 500; transition: all 0.2s; }
    .btn-primary { background: #10a37f; color: white; }
    .btn-primary:hover { background: #0d8a6a; }
    .btn-secondary { background: #2a2a2a; color: #e0e0e0; }
    .btn-secondary:hover { background: #3a3a3a; }
    .btn-switch { padding: 6px 14px; font-size: 13px; }
    .actions { display: flex; gap: 8px; margin-top: 12px; }
    .status-bar { display: flex; gap: 16px; font-size: 13px; color: #888; margin-top: 16px; }
    .toast { position: fixed; bottom: 20px; right: 20px; background: #10a37f; color: white; padding: 12px 20px; border-radius: 8px; font-size: 14px; opacity: 0; transition: opacity 0.3s; }
    .toast.show { opacity: 1; }
    .help { margin-top: 32px; padding: 20px; background: #111; border-radius: 8px; font-size: 13px; line-height: 1.8; }
    .help code { background: #1a1a1a; padding: 2px 6px; border-radius: 4px; font-size: 12px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Codex <span>Model Switcher</span></h1>
    <p class="subtitle" id="subtitle">加载中...</p>

    <div class="card">
      <div class="card-title"><div class="dot dot-green"></div>模型供应商</div>
      <div class="provider-grid" id="providers"></div>
    </div>

    <div class="help">
      <strong>配置 Codex CLI:</strong><br>
      编辑 <code>~/.codex/config.toml</code>，设置 <code>base_url = "http://127.0.0.1:11435/v1"</code><br><br>
      <strong>配置 CCSwitch:</strong><br>
      API 地址填写 <code>http://127.0.0.1:11435/v1</code><br><br>
      <strong>切换模型:</strong><br>
      在上方点击"切换"按钮，然后重启 Codex 即可生效。
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    function toast(msg) {
      const el = document.getElementById('toast');
      el.textContent = msg;
      el.classList.add('show');
      setTimeout(() => el.classList.remove('show'), 2000);
    }

    async function loadStatus() {
      const res = await fetch('/admin/api/status');
      const data = await res.json();
      document.getElementById('subtitle').textContent = `v${data.version} · 默认: ${data.providers[data.activeProvider]?.name || data.activeProvider}`;
      renderProviders(data);
    }

    function renderProviders(data) {
      const container = document.getElementById('providers');
      container.innerHTML = '';
      for (const [id, prov] of Object.entries(data.providers)) {
        const isActive = prov.active;
        const div = document.createElement('div');
        div.className = `provider-item ${isActive ? 'active' : ''}`;
        div.innerHTML = `
          <div class="provider-header">
            <div>
              <span class="provider-name">${prov.name}</span>
              <span class="provider-model">${prov.model}</span>
            </div>
            <span class="badge ${isActive ? 'badge-active' : 'badge-inactive'}">${isActive ? '使用中' : '未启用'}</span>
          </div>
          <div class="form-group">
            <label>API Key</label>
            <input type="password" id="key-${id}" value="${prov.configured ? '••••••••' : ''}" placeholder="输入 API Key">
          </div>
          <div class="actions">
            ${!isActive ? `<button class="btn btn-primary btn-switch" onclick="switchTo('${id}')">切换</button>` : ''}
            <button class="btn btn-secondary" onclick="saveKey('${id}')">保存 Key</button>
          </div>
        `;
        container.appendChild(div);
      }
    }

    async function switchTo(provider) {
      const res = await fetch('/admin/api/switch', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ provider })
      });
      const data = await res.json();
      if (data.ok) {
        toast(`已切换到 ${provider}`);
        loadStatus();
      } else {
        toast(data.error || '切换失败');
      }
    }

    async function saveKey(provider) {
      const input = document.getElementById(`key-${provider}`);
      const key = input.value.trim();
      if (!key || key === '••••••••') { toast('请输入 API Key'); return; }
      const res = await fetch('/admin/api/config', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ [`providers.${provider}.apiKey`]: key })
      });
      const data = await res.json();
      if (data.ok) { toast('Key 已保存'); loadStatus(); }
      else { toast(data.error || '保存失败'); }
    }

    loadStatus();
    setInterval(loadStatus, 10000);
  </script>
</body>
</html>
